# ──────────────────────────────────────────────────────────────────
# OhMyCaptcha — docker-compose.yml
# Runs the captcha solver on port 8000. Connects to host's Ollama
# (already running on port 11434) via host.docker.internal.
# ──────────────────────────────────────────────────────────────────

services:
  # ── OhMyCaptcha — captcha solving service ─────────────────
  ohmycaptcha:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ohmycaptcha
    restart: unless-stopped
    ports:
      - "8081:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000

      # Local model — uses host's Ollama (already running)
      - LOCAL_BASE_URL=http://host.docker.internal:11434/v1
      - LOCAL_API_KEY=EMPTY
      - LOCAL_MODEL=qwen2.5vl:7b

      # Cloud model — replace with your actual endpoint if using a remote API
      - CLOUD_BASE_URL=https://your-openai-compatible-endpoint/v1
      - CLOUD_API_KEY=
      - CLOUD_MODEL=gpt-5.4

      # Playwright browser config
      - BROWSER_HEADLESS=true
      - BROWSER_TIMEOUT=30
      - BROWSER_PROFILE_DIR=/app/firefox-profile

      # Captcha solving
      - CAPTCHA_RETRIES=3
      - CAPTCHA_TIMEOUT=30

      # Auth (optional — leave empty to disable client key checking)
      - CLIENT_KEY=
    volumes:
      - firefox_profile:/app/firefox-profile
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  firefox_profile:
    driver: local
    name: ohmycaptcha_firefox_profile
